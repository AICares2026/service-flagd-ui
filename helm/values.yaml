service:
  name: service-flagd-ui
image:
  repository: 952893849914.dkr.ecr.us-east-1.amazonaws.com/aicares-application/flagd-ui
containerPort: 4000
resources:
  limits:
    memory: "200Mi"
  requests:
    memory: "64Mi"
    cpu: "50m"
env:
  - name: FLAGD_UI_PORT
    value: "4000"
  - name: FLAGD_HOST
    value: "flagd"
  - name: FLAGD_PORT
    value: "8013"
nodeSelector:
  eks.amazonaws.com/nodegroup: graviton-workers
